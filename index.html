<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Visual reference for BuilderIcons v0.1.32 — Regular & Filled variants">
  <title>BuilderIcons v0.1.32 — Regular & Filled</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>BuilderIcons v0.1.32</h1>
    <p>Roblox Corporation &copy; 2025 &bull; Regular + Filled</p>
    <div class="stats">
      <div class="stat">554 total icons</div>
      <div class="stat">551 in both variants</div>
      <div class="stat">1 Regular only</div>
      <div class="stat">2 Filled only</div>
      <div class="stat">555 ligatures</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <span class="search-icon">&#x2315;</span>
    <input type="text" id="search" placeholder="Search icons..." autocomplete="off">
    <div class="variant-toggle" id="variantToggle">
      <button class="active" data-v="both">Both</button>
      <button data-v="reg">Regular</button>
      <button data-v="fill">Filled</button>
    </div>
  </div>

  <!-- Category Tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item"><div class="legend-dot dot-both"></div> In both variants</div>
    <div class="legend-item"><div class="legend-dot dot-reg"></div> Regular only</div>
    <div class="legend-item"><div class="legend-dot dot-fill"></div> Filled only</div>
  </div>

  <!-- Content -->
  <div class="count-badge" id="countBadge"></div>
  <div id="content"></div>
  <div class="toast" id="toast"></div>

  <script src="js/app.js"></script>
</body>
</html>
