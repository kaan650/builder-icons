<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Visual reference for BuilderIcons — Regular & Filled variants">
  <title>BuilderIcons — Regular & Filled</title>
  <link rel="icon" href="icons/favicon.ico" sizes="16x16 32x32 48x48 64x64">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="256x256" href="icons/icon-256.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
</head>
<body>

  <div class="header">
    <h1>BuilderIcons</h1>
    <div class="stats" id="stats"></div>
  </div>

  <div class="toolbar">
    <span class="search-icon">&#x2315;</span>
    <input type="text" id="search" placeholder="Search icons..." autocomplete="off">
    <div class="variant-toggle" id="variantToggle">
      <button class="active" data-v="both">Both</button>
      <button data-v="reg">Regular</button>
      <button data-v="fill">Filled</button>
    </div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot dot-both"></div> In both variants</div>
    <div class="legend-item"><div class="legend-dot dot-reg"></div> Regular only</div>
    <div class="legend-item"><div class="legend-dot dot-fill"></div> Filled only</div>
  </div>

  <div class="count-badge" id="countBadge"></div>
  <div id="content">
    <div class="loading">
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading icons...</div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script src="js/app.js"></script>
</body>
</html>
